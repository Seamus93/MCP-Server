name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: ruff check .
        continue-on-error: true

      - name: Run python -m compileall .
        run: python -m compileall .

      - name: Run pytest
        env:
          PYTHONPATH: .
        run: python -m pytest -q

  sonar:
    name: Sonar
    needs: ci
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    env:
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >-
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Sonar skipped
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_ORGANIZATION == '' }}
        run: 'echo "Sonar non configurato nel repository remoto: job completato come no-op."'

  security:
    name: Security
    needs: ci
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        continue-on-error: true

  codeql:
    name: CodeQL
    needs: ci
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  deploy-vercel:
    name: Deploy Vercel
    needs:
      - sonar
      - security
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_VERCEL == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  deploy:
    name: Deploy
    needs:
      - sonar
      - security
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      VPS_APP_DIR: ${{ vars.VPS_APP_DIR }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy configuration
        id: deploy_config
        run: |
          if [ -n "$DEPLOY_HOST" ] && [ -n "$DEPLOY_USER" ] && [ -n "$DEPLOY_KEY" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "DEPLOY_HOST, DEPLOY_USER or DEPLOY_KEY are not configured."
          fi

      - name: Deploy on VPS
        if: ${{ steps.deploy_config.outputs.enabled == 'true' }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          APP_DIR="${VPS_APP_DIR:-/opt/projects/mcp-server}"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$DEPLOY_USER@$DEPLOY_HOST" \
            "set -e
            cd '$APP_DIR'
            git config core.fileMode false
            
            # Check for dirty worktree
            if [ -n \"\$(git status --porcelain)\" ]; then
              echo 'Warning: Dirty worktree detected. Cleaning...'
              git clean -fd
              git reset --hard HEAD
            fi
            
            # Pull latest changes
            git fetch origin main
            git checkout main
            git reset --hard origin/main
            
            # Deploy containers
            docker compose pull || true
            docker compose down
            docker compose build --no-cache
            docker compose up -d --force-recreate"

      - name: Health check
        if: ${{ steps.deploy_config.outputs.enabled == 'true' }}
        run: |
          APP_HOST="${{ secrets.DEPLOY_HOST }}"
          for i in {1..30}; do
            if curl -sf "http://$APP_HOST:8000/health" > /dev/null; then
              echo "✓ Health check passed"
              exit 0
            fi
            echo "Attempt $i/30: Waiting for service to be ready..."
            sleep 2
          done
          echo "✗ Health check failed after 60 seconds"
          exit 1
