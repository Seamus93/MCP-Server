name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write
  id-token: write

concurrency:
  group: pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff check
        run: ruff check .
        continue-on-error: true

      - name: Run python -m compileall .
        run: python -m compileall .

      - name: Run pytest
        env:
          PYTHONPATH: .
        run: python -m pytest -q

  sonar:
    name: Sonar
    needs: ci
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    env:
      SONAR_ORGANIZATION: ${{ vars.SONAR_ORGANIZATION }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_ORGANIZATION != '' }}
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          args: >-
            -Dsonar.organization=${{ env.SONAR_ORGANIZATION }}
            -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io

      - name: Sonar skipped
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_ORGANIZATION == '' }}
        run: 'echo "Sonar non configurato nel repository remoto: job completato come no-op."'

  security:
    name: Security
    needs: ci
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
        continue-on-error: true

      - name: Upload Trivy SARIF
        if: always() && hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        continue-on-error: true

  codeql:
    name: CodeQL
    needs: ci
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3

  deploy-vercel:
    name: Deploy Vercel
    needs:
      - sonar
      - security
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_VERCEL == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'

  deploy:
    name: Deploy
    needs:
      - sonar
      - security
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
      PROJECT_URL: ${{ secrets.PROJECT_URL }}
      HEALTH_URL: ${{ secrets.HEALTH_URL }}
    steps:
      - name: Skip deploy when credentials are missing
        if: ${{ env.DEPLOY_HOST == '' || env.DEPLOY_USER == '' || env.DEPLOY_KEY == '' }}
        run: 'echo "Deploy saltato: credenziali deploy non configurate."'

      - name: Deploy via SSH
        if: ${{ env.DEPLOY_HOST != '' && env.DEPLOY_USER != '' && env.DEPLOY_KEY != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ env.DEPLOY_KEY }}
          envs: VPS_APP_DIR,PROJECT_URL,HEALTH_URL
          script: |
            set -e

            PROJECT_DIR="${VPS_APP_DIR:-/opt/projects/mcp-server}"
            cd "$PROJECT_DIR"
            git config core.fileMode false

            DIRTY="$(git status --porcelain)"
            if [ -n "$DIRTY" ]; then
              BLOCKING="$(printf '%s\n' "$DIRTY" | awk '{print $2}' | grep -Ev '^(docs/|README\.md|\.github/workflows/|scripts/deploy-vps\.sh|\.env)$' || true)"
              if [ -n "$BLOCKING" ]; then
                echo "Deploy bloccato: worktree remoto sporco fuori whitelist."
                printf '%s\n' "$DIRTY"
                exit 1
              fi
              printf '%s\n' "$DIRTY" | awk '{print $2}' | xargs -r git checkout --
            fi

            git fetch origin main
            git checkout main
            git reset --hard origin/main

            docker compose pull || true
            docker compose up -d --build --force-recreate

            HEALTH_CHECK_RETRIES=12
            for i in $(seq 1 "$HEALTH_CHECK_RETRIES"); do
              if curl -fsS http://127.0.0.1:8000/health --max-time 5; then
                break
              fi
              if [ "$i" -eq "$HEALTH_CHECK_RETRIES" ]; then
                echo "Health check fallito."
                docker compose ps
                docker compose logs mcp-server --tail=100
                exit 1
              fi
              sleep 5
            done

            if [ -x /opt/infra/scripts/register-project.sh ] && [ -n "${PROJECT_URL:-}" ] && [ -n "${HEALTH_URL:-}" ]; then
              /opt/infra/scripts/register-project.sh mcp-server "${PROJECT_URL}" "${HEALTH_URL}"
            else
              echo "register-project.sh non eseguito: script o variabili mancanti."
            fi
