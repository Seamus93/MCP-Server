# Runtime configuration is loaded from `.env`.
# GitHub Actions retrieves production secrets from Infisical before deploy jobs run.
name: mcp-server

x-default-labels: &default-labels
  project.name: "mcp-server"
  project.environment: "${APP_ENV:-production}"
  monitoring.enabled: "true"
  homepage.group: "Projects"
  kuma.group: "Livello 2 — Applicazioni"

services:
  mcp-server:
    image: ghcr.io/seamus93/mcp-server:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      APP_DIR: ${APP_DIR:-/opt/projects/mcp-server}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      MCP_GATEWAY_TOKEN: ${MCP_GATEWAY_TOKEN}
    ports:
      - "127.0.0.1:${MCP_HOST_PORT:-8000}:8000"
    volumes:
      - mcp_outbox:/app/.mcp_outbox
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels: *default-labels

volumes:
  mcp_outbox:
